<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Ntrvl</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F3F5C6;
      --surface: #ffffff;
      --text: #2a2b1f;
      --muted: #696a58;
      --accent: #E05C4E;
      --border: #d4d6b0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      padding: 60px 24px 100px;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 56px;
    }

    .wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      display: block;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    section {
      margin-bottom: 36px;
    }

    h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 72px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="wordmark">Ntrvl</span>
      <h1>Support</h1>
    </header>

    <section>
      <p>If you run into any issues, or have feedback or ideas, we'd love to hear from you.</p>
    </section>

    <hr />

    <section>
      <h2>Get in Touch</h2>
      <p>Send an email to <a href="mailto:ntrvlapp@gmail.com">ntrvlapp@gmail.com</a> and we'll get back to you as soon as we can.</p>
    </section>

    <footer>
      <p>&copy; 2026 Brett Rodgers. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
